name: plots
options:
  bundleIdPrefix: com.plots
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
schemes:
  plots:
    build:
      targets:
        plots: all
        plots-tests: testing
    run:
      config: Debug
    test:
      targets:
        - name: plots-tests
          randomExecutionOrder: false
targets:
  plots:
    type: application
    platform: macOS
    sources:
      - plots
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plots.app
        INFOPLIST_FILE: plots/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
  plots-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - plots-tests
    dependencies:
      - target: plots
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/plots.app/Contents/MacOS/plots"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
